name: tv_conversation_challenged
description: >
  Beat 2F regression: floor_lounge_tv_day7 (Day 7 evening belonging,
  racism friction beat — Keith's "those people" line during the Beirut
  news). Walks news_segment (auto), keith_opines (auto), picks challenged
  on room_response, asserts walk flag + period_stance bump.

  Path: fixture (dayIndex=2 morning, started_day=1) → clear roommate
  chain → resolve hallway_morning_day3 (Day 4 morning belonging) →
  resolve floor_hallway_day6 (Day 7 evening belonging — competitor that
  expires Day 8 and would otherwise dominate the life-stream slot) →
  Day 8 evening (storylet-keyed "Day 7") → floor_lounge_tv_day7 served.
extends: fixtures/after_day0_party_path.snapshot.json

steps:
  - type: set_identity
    race: middle_eastern
    gender: man
    sexuality: straight

  # Day 2 morning — clear roommate chain.
  - type: choose
    storylet_key: first_morning
    choice_id: head_to_orientation

  # Advance Day 2 → Day 4 morning.
  - type: advance_segment
  - type: advance_segment
  - type: sleep
  - type: advance_segment
  - type: advance_segment
  - type: sleep

  # Day 4 morning — clear hallway_morning_day3.
  - type: choose
    storylet_key: hallway_morning_day3
    choice_id: head_to_class_day3

  # Advance Day 4 → Day 7 evening.
  - type: advance_segment   # Day 4 afternoon
  - type: advance_segment   # Day 4 evening
  - type: sleep             # Day 5 morning
  - type: advance_segment   # Day 5 afternoon
  - type: advance_segment   # Day 5 evening
  - type: sleep             # Day 6 morning
  - type: advance_segment   # Day 6 afternoon
  - type: advance_segment   # Day 6 evening
  - type: sleep             # Day 7 morning
  - type: advance_segment   # Day 7 afternoon
  - type: advance_segment   # Day 7 evening

  # Day 7 evening — floor_hallway_day6 is the belonging-evening urgent
  # candidate (window 7-8, expires Day 8). Clear it; floor_lounge_tv_day7
  # then becomes the urgent belonging-evening candidate from Day 8 onward.
  - type: choose
    storylet_key: floor_hallway_day6
    choice_id: keep_walking

  # Advance Day 7 evening → Day 8 evening.
  - type: sleep             # Day 8 morning
  - type: advance_segment   # Day 8 afternoon
  - type: advance_segment   # Day 8 evening

  # Day 8 evening — floor_lounge_tv_day7 should be the belonging-evening
  # candidate (window 8-10, expires Day 10).
  - type: expect_storylet_available
    storylet_key: floor_lounge_tv_day7
    at: { day: 8, segment: evening, track: belonging }
    served_by: pool

  # Walk: news_segment (auto), keith_opines (auto, speaker keith) →
  # room_response (THE FRICTION). Pick challenged.
  - type: choose_node
    node_id: room_response
    micro_choice_id: tv_challenged

  # Verify.
  - type: expect_walk_flag
    flag: tv_challenged
    present: true
  - type: expect_walk_flag
    flag: tv_absorbed
    present: false
  - type: expect_walk_flag
    flag: tv_deflected
    present: false

  - type: expect_period_stance
    tag: challenged
    op: eq
    value: 1

  - type: expect_prior_period_stance
    value: challenged

  # Resolve. news_continues auto-advances to choices.
  - type: choose
    storylet_key: floor_lounge_tv_day7
    choice_id: stay_lounge
