name: home_pay_phone
description: >
  Tier 3 coverage backfill for the home track.

  pay_phone_line is the only storylet on the home track (order_index=10)
  with due_offset_days=7, segment=evening, expires_after_days=3. With
  started_day=1 it is eligible from Day 8 evening through Day 11 evening.
  Served via chain override on Day 8 — first day of eligibility.

  Regression test ensures the home track wakes up on Day 8 evening instead
  of staying silent forever (the home track had 0% playthrough coverage
  before this script). Before Day 8 evening, the home track returns nothing
  because its override is not yet due.

steps:
  # ── Day 1: Standard cards-path traversal ────────────────────────────────
  - type: choose
    storylet_key: room_214
    choice_id: head_out

  - type: choose
    storylet_key: dorm_hallmates
    choice_id: lunch_first

  - type: advance_segment

  - type: choose
    storylet_key: lunch_floor
    choice_id: catch_keiths_eye

  - type: advance_segment

  - type: choose
    storylet_key: evening_choice
    choice_id: go_to_cards

  - type: sleep

  # ── Days 2-7: sleep through, target is Day 8 evening ────────────────────
  - type: sleep
  - type: sleep
  - type: sleep
  - type: sleep
  - type: sleep
  - type: sleep

  # ── Day 8 Morning — home track not yet serving (evening segment) ────────
  - type: expect_storylet_not_available
    storylet_key: pay_phone_line

  # ── Day 8 Afternoon ─────────────────────────────────────────────────────
  - type: advance_segment

  - type: expect_storylet_not_available
    storylet_key: pay_phone_line

  # ── Day 8 Evening — pay_phone_line via chain override ───────────────────
  - type: advance_segment

  # 2026-05-04: floor_lounge_tv_day7 (Beat 2F, belonging Day 8 evening,
  # window dayIndex 8-10) competes for the global 2-slot cap on Day 8
  # evening alongside money_reality_check (last day 8) and pay_phone_line
  # (chain). Clear the belonging competitor so pay_phone_line surfaces
  # via chain. Resolution uses leave_for_room (no friction beat exercised).
  - type: choose
    storylet_key: floor_lounge_tv_day7
    choice_id: leave_for_room

  - type: expect_storylet_available
    storylet_key: pay_phone_line
    served_by: chain
    at: {track: home}

  - type: choose
    storylet_key: pay_phone_line
    choice_id: phone_continue
