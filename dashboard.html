var STORAGE_KEY='mmv_dashboard_state';
function loadTasks(){try{var s=localStorage.getItem(STORAGE_KEY);if(s){var o=JSON.parse(s);return DEFAULT_TASKS.map(function(t){return Object.assign({},t,{status:o[t.id]||t.status})})}}catch(e){}return DEFAULT_TASKS.map(function(t){return Object.assign({},t)})}
function saveTasks(){var o={};tasks.forEach(function(t){o[t.id]=t.status});try{localStorage.setItem(STORAGE_KEY,JSON.stringify(o))}catch(e){}}
var tasks=loadTasks(),activeFilter='all';
function moveTask(id,ns){var t=tasks.find(function(t){return t.id===id});if(!t)return;t.status=ns;saveTasks();render();showToast(t.title+' \u2192 '+ns.replace('progress','In Progress'))}
function showToast(m){var e=document.getElementById('toast');e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show')},2000)}
function createCard(task,col){var card=document.createElement('div');card.className='card';var actions=document.createElement('div');actions.className='card-actions';if(col==='backlog'){var b1=document.createElement('button');b1.className='move-btn';b1.innerHTML='&#9654;';b1.title='Move to In Progress';b1.onclick=function(e){e.stopPropagation();moveTask(task.id,'progress')};actions.appendChild(b1);var b2=document.createElement('button');b2.className='move-btn move-done';b2.innerHTML='&#10003;';b2.title='Move to Done';b2.onclick=function(e){e.stopPropagation();moveTask(task.id,'done')};actions.appendChild(b2)}else if(col==='progress'){var bL=document.createElement('button');bL.className='move-btn';bL.innerHTML='&#9664;';bL.title='Back to Backlog';bL.onclick=function(e){e.stopPropagation();moveTask(task.id,'backlog')};actions.appendChild(bL);var bR=document.createElement('button');bR.className='move-btn move-done';bR.innerHTML='&#10003;';bR.title='Move to Done';bR.onclick=function(e){e.stopPropagation();moveTask(task.id,'done')};actions.appendChild(bR)}else{var bB=document.createElement('button');bB.className='move-btn';bB.innerHTML='&#9664;';bB.title='Back to In Progress';bB.onclick=function(e){e.stopPropagation();moveTask(task.id,'progress')};actions.appendChild(bB)}var tags='';if(task.priority)tags+='<span class="tag tag-'+task.priority+'">'+task.priority+'</span>';if(task.category)tags+='<span class="tag tag-'+task.category.toLowerCase()+'">'+task.category+'</span>';card.innerHTML='<div class="card-title">'+task.title+'</div>'+(task.desc?'<div class="card-desc">'+task.desc+'</div>':'')+(tags?'<div class="card-tags">'+tags+'</div>':'');card.appendChild(actions);return card}
function render(){var cols={backlog:'cards-backlog',progress:'cards-progress',done:'cards-done'};Object.keys(cols).forEach(function(col){var c=document.getElementById(cols[col]);c.innerHTML='';var ct=tasks.filter(function(t){return t.status===col});var f=ct.filter(function(t){if(activeFilter==='all')return true;if(activeFilter==='high')return t.priority==='high';return t.category===activeFilter});var secs=[],sm={};f.forEach(function(t){if(!sm[t.section]){sm[t.section]=[];secs.push(t.section)}sm[t.section].push(t)});secs.forEach(function(s){var l=document.createElement('div');l.className='section-label';l.textContent=s;c.appendChild(l);sm[s].forEach(function(t){c.appendChild(createCard(t,col))})});document.getElementById('count-'+col).textContent=f.length});var cnt=function(s){return tasks.filter(function(t){return t.status===s}).length};document.getElementById('stat-backlog').textContent=cnt('backlog');document.getElementById('stat-progress').textContent=cnt('progress');document.getElementById('stat-done').textContent=cnt('done')}
document.querySelectorAll('.filter-btn').forEach(function(b){b.addEventListener('click',function(){document.querySelectorAll('.filter-btn').forEach(function(x){x.classList.remove('active')});b.classList.add('active');activeFilter=b.dataset.filter;render()})});
document.getElementById('resetBtn').addEventListener('click',function(){if(confirm('Reset all task positions to default?')){localStorage.removeItem(STORAGE_KEY);tasks=DEFAULT_TASKS.map(function(t){return Object.assign({},t)});render();showToast('Board reset to default')}});
render();
</script>
</body>
</html>
